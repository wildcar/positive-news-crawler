<table><tr><th>Время</th><th>Тип</th><th>Источник</th><th>Событие</th></tr>{% for event in events %}<tr><td>{{ event.created_at }}</td><td>{{ event.event_type }}</td><td>{{ event.source|default:"—" }}</td><td>{{ event.message }}</td></tr>{% empty %}<tr><td colspan="4">Событий нет</td></tr>{% endfor %}</table>
