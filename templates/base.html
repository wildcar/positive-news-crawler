<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Positive News Crawler{% endblock %}</title>
<style>
:root{font-family:system-ui,sans-serif;color:#17212b;background:#f4f7f9}body{margin:0}header{background:#17324d;color:#fff;padding:.8rem 2rem;display:flex;gap:1.5rem;align-items:center}header a{color:#fff;text-decoration:none}header form{margin-left:auto}main{max-width:1180px;margin:2rem auto;padding:0 1rem}.card{background:#fff;border:1px solid #dce3e8;border-radius:10px;padding:1rem;margin-bottom:1rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}table{width:100%;border-collapse:collapse;background:#fff}th,td{text-align:left;padding:.65rem;border-bottom:1px solid #e5eaee;vertical-align:top}input,select,textarea{width:100%;max-width:700px;padding:.55rem;border:1px solid #bfcbd3;border-radius:5px;box-sizing:border-box}button,.button{display:inline-block;background:#176b87;color:white;border:0;border-radius:5px;padding:.55rem .9rem;text-decoration:none;cursor:pointer}.muted{color:#61717d}.ok{color:#197043}.bad{color:#a32b2b}.messages{list-style:none;padding:0}.messages li{background:#dff3e7;padding:.7rem;border-radius:5px}.text{white-space:pre-wrap;line-height:1.55}.pill{background:#e5edf2;border-radius:1rem;padding:.15rem .55rem;font-size:.85rem}</style>
</head><body><header><strong>Positive News Crawler</strong>{% if user.is_authenticated %}<a href="{% url 'dashboard' %}">Дашборд</a><a href="{% url 'source_list' %}">Источники</a><a href="{% url 'news_list' %}">Новости</a><a href="{% url 'run_list' %}">Запуски</a><a href="{% url 'event_list' %}">Журнал</a><form method="post" action="{% url 'logout' %}">{% csrf_token %}<button>Выйти</button></form>{% endif %}</header><main>{% if messages %}<ul class="messages">{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul>{% endif %}{% block content %}{% endblock %}</main></body></html>
